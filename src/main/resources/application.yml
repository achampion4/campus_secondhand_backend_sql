# 校园二手交易平台 后端配置  负责人：董炜文  日期：6/17
server:
  port: 8080

spring:
  application:
    name: campus-secondhand
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_secondhand?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 1234   # 请改成本机 MySQL 密码

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.hitwh.secondhand.entity
  configuration:
    map-underscore-to-camel-case: true   # 下划线转驼峰

# 自定义 JWT 配置
jwt:
  secret: campus-secondhand-secret-key-please-change-in-production-2026
  expire: 86400000   # 过期时间(毫秒)，24小时
